services:
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: reportsfw-oracle
    platform: linux/arm64
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "OracleXE_2026"
      APP_USER: "reports_user"
      APP_USER_PASSWORD: "Reports@2026"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/oracle-seed.sql:/container-entrypoint-initdb.d/01_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  oracle-data:
